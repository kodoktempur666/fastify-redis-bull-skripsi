services:
  fastify-opti-app:
    build: ./fastify
    container_name: fastify-opti-app
    image: fastify-opti-app:latest
    ports:
      - "3015:3015"
    network_mode: "host"
    environment:
      PORT: 3015
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: psql
      DB_NAME: mydb

  express-opti-app:
    build: ./express
    container_name: express-opti-app
    image: express-opti-app:latest
    depends_on: 
      - fastify-opti-app
    ports:
      - "3010:3010"
    network_mode: "host"
    environment:
      PORT: 3010
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: psql
      DB_NAME: mydb
  
  # cart-worker:
