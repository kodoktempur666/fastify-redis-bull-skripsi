services:
  app:
    build: ./app
    container_name: fastify_opti_app
    ports:
      - "3025:3025"
    environment:
      PORT: 3025
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: mydb
    networks:
      - monitoring

networks:
  monitoring:
    external: true
