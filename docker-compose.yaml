services:
  express-opti-app:
    build: ./express
    container_name: express_opti_app
    ports:
      - "3010:3010"
    network_mode: "host"
    environment:
      PORT: 3010
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: psql
      DB_NAME: mydb

