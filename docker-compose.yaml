  fastify-opti-app:
    build: ./fastify
    container_name: fastify-opti-app
    ports:
      - "3015:3015"
    network_mode: "host"
    environment:
      PORT: 3015
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: psql
      DB_NAME: mydb

