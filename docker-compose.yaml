services:
  app:
    build: ./app
    container_name: fastify_opti_app
    ports:
      - "3025:3025"
    network_mode: "host"
    environment:
      PORT: 3025
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: psql
      DB_NAME: mydb

  worker-post-nogrpc:
    build: ./app
    container_name: worker_post_nogrpc
    image: worker-post-nogrpc:latest
    network_mode: "host"
    command: node src/worker/checkoutPost.worker.js
    environment:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: psql
      DB_NAME: mydb
  
  worker-put-nogrpc:
    build: ./app
    container_name: worker_put_nogrpc
    image: worker-patch-nogrpc:latest
    network_mode: "host"
    command: node src/worker/checkoutPut.worker.js
    environment:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: psql
      DB_NAME: mydb
  
  worker-patch-nogrpc:
    build: ./app
    container_name: worker_patch_nogrpc
    image: worker-patch-nogrpc:latest
    network_mode: "host"
    command: node src/worker/checkoutPatch.worker.js
    environment:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: psql
      DB_NAME: mydb


