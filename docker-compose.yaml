services:
  app:
    build: ./app
    container_name: fastify_opti_app
    ports:
      - "3025:3025"
    environment:
      PORT: 3000
      DB_HOST: host.docker.internal
      DB_USER: postgres
      DB_PASSWORD: psql
      DB_NAME: mydb
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring
      
networks:
  monitoring:
    external: true
