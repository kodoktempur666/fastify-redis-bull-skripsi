  checkout-worker:
    build: ./express
    container_name: checkout-worker
    image: checkout-worker:latest
    depends_on: 
      - express-opti-app
    network_mode: "host"
    command: node src/workers/checkout.worker.js
    environment:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: psql
      DB_NAME: mydb
  

  email-worker:
    build: ./express
    container_name: email-worker
    image: email-worker:latest
    depends_on:
      - express-opti-app
    network_mode: "host"
    command: node src/workers/email.worker.js

